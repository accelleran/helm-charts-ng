apiVersion: v1
kind: ServiceAccount
metadata:
  name: "{{ include "acc-common.fullname" . }}-controller"
  labels:
    {{- include "acc-common.labels.5g" . | nindent 4 }}
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: "{{ .Release.Name }}-netconf-init-config-job-reader"
rules:
- apiGroups:
  - batch
  resources:
  - jobs
  verbs:
  - get
  resourceNames:
  - "{{ .Release.Name }}-netconf-init-config"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: "{{ .Release.Name }}-netconf-init-config-job-reader-binding"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: "{{ .Release.Name }}-netconf-init-config-job-reader"
subjects:
- kind: ServiceAccount
  name: "{{ include "acc-common.fullname" . }}-controller"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: "{{ .Release.Name }}-instance-scaler"
rules:
- apiGroups:
  - apps
  resources:
  - deployments
  verbs:
  - "get"
  - "update"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: "{{ .Release.Name }}-instance-scaler"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: "{{ .Release.Name }}-instance-scaler"
subjects:
- kind: ServiceAccount
  name: "{{ include "acc-common.fullname" . }}-controller"
